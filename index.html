<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>المستودع</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#14161a">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;background:#14161a;color:#e8e6e1;font-size:15px;line-height:1.5}
:root{--am:#c98a4b;--gr:#5fb583;--rd:#e07a5f;--bg:#14161a;--bg2:#1c1f24;--bg3:#22262c;--bd:#2a2d33;--t1:#e8e6e1;--t2:#b5b1aa;--t3:#7a7772;--nh:62px;--th:54px}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-height:-webkit-fill-available}
#topbar{height:var(--th);background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10}
#tb-back{font-size:22px;cursor:pointer;color:var(--am);min-width:28px;display:none}
#tb-title{font-size:17px;font-weight:700;flex:1}
#tb-save{font-size:11px;color:var(--t3);min-width:52px;text-align:left}
#tb-gear{font-size:20px;cursor:pointer;padding:4px}
#tb-act{background:var(--am);color:#14161a;border:none;padding:7px 13px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;display:none}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nh) + env(safe-area-inset-bottom,0px) + 8px);-webkit-overflow-scrolling:touch}
#nav{height:calc(var(--nh) + env(safe-area-inset-bottom,0px));background:var(--bg2);border-top:1px solid var(--bd);display:flex;align-items:stretch;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--t3);font-size:10px;padding:8px 0}
.ni.active{color:var(--am)}.ni .ic{font-size:22px}
.sc{display:none}.sc.active{display:block}
#sc-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center;gap:18px}
.lg-logo{font-size:60px}.lg-title{font-size:26px;font-weight:700}.lg-sub{font-size:15px;color:var(--t2);line-height:1.7}
.lg-btn{background:var(--am);color:#14161a;border:none;padding:16px 32px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:300px}
.lg-btn:disabled{background:var(--bg3);color:var(--t3)}.lg-note{font-size:13px;color:var(--t3)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin:0 16px 12px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.sc-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:14px}
.sc-card .lbl{font-size:12px;color:var(--t2);margin-bottom:6px}.sc-card .val{font-size:20px;font-weight:700}
.sc-card .sub{font-size:11px;color:var(--t3);margin-top:2px}
.sh{padding:18px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.st{font-size:15px;font-weight:700;color:var(--t2)}
.sa{background:var(--am);color:#14161a;border:none;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.li{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin:0 16px 10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.li:active{background:var(--bg3)}
.li-ic{width:42px;height:42px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.li-body{flex:1;min-width:0}.li-title{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--t2);margin-top:2px}.li-r{text-align:left;flex-shrink:0}
.li-amt{font-weight:700;font-size:15px;color:var(--am)}.li-st{font-size:11px;margin-top:2px}
.st-p{color:var(--t3)}.st-c{color:var(--gr)}.st-a{color:var(--rd)}
.alert-b{background:#2a1a1a;border:1px solid #7a3b3b;border-radius:10px;padding:12px 16px;margin:0 16px 12px;font-size:13px;color:var(--rd)}
.fs{padding:16px}.f{margin-bottom:16px}
.f label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:500}
.f input,.f select,.f textarea{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--t1);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--am)}
.f textarea{min-height:80px;resize:vertical}.fr{display:flex;gap:10px}.fr .f{flex:1}
.cb{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:16px;font-size:14px}
.cr{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.cr.tot{border-top:1px solid var(--bd);margin-top:8px;padding-top:10px;font-weight:700;color:var(--am);font-size:16px}
.cl-list{margin-top:8px}
.cl-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.cl-row input{flex:1}.cl-row .qi{width:90px;flex:none}
.cl-row .db{width:36px;height:36px;background:#2a1a1a;border:1px solid #7a3b3b;border-radius:8px;color:var(--rd);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.acb{width:100%;background:var(--bg3);border:1px dashed var(--bd);border-radius:10px;padding:10px;color:var(--am);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.sb{width:calc(100% - 32px);margin:8px 16px 12px;background:var(--am);color:#14161a;border:none;padding:15px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer}
.sb2{width:calc(100% - 32px);margin:4px 16px 10px;background:var(--bg3);color:var(--t1);border:1px solid var(--bd);padding:14px;border-radius:12px;font-size:15px;cursor:pointer}
.db2{width:calc(100% - 32px);margin:4px 16px 20px;background:transparent;color:var(--rd);border:1px solid #7a3b3b;padding:13px;border-radius:12px;font-size:15px;cursor:pointer}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end}
.mo.open{display:flex}
.ms{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:8px 0 32px}
.mh{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:8px auto 16px}
.mt{font-size:18px;font-weight:700;padding:0 16px 16px;border-bottom:1px solid var(--bd);margin-bottom:8px}
.es{text-align:center;padding:60px 32px;color:var(--t3)}.es .ic{font-size:48px;margin-bottom:16px}.es .msg{font-size:15px;line-height:1.7}
.lo{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:200}
.loader{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--am);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}.lm{color:var(--t2);font-size:15px}
#toast{position:fixed;bottom:calc(var(--nh)+16px);left:16px;right:16px;background:#1e2e22;border:1px solid var(--gr);color:#a8e6bc;padding:14px 16px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;z-index:300;transform:translateY(20px);opacity:0;transition:all .25s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}#toast.err{background:#2a1a1a;border-color:#7a3b3b;color:#e6a8a8}
.tabs{display:flex;gap:8px;padding:12px 16px 0;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--bg2);border:1px solid var(--bd);color:var(--t2)}
.tab.active{background:var(--am);color:#14161a;border-color:var(--am)}
.srch{margin:12px 16px;position:relative}
.srch input{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:11px 14px 11px 40px;color:var(--t1);font-size:15px;outline:none}
.srch input:focus{border-color:var(--am)}.srch .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.b-am{background:#3a2510;color:var(--am)}.b-gr{background:#152a1e;color:var(--gr)}.b-rd{background:#2a1515;color:var(--rd)}.b-gy{background:var(--bg3);color:var(--t3)}
.inv-tbl{width:100%;border-collapse:collapse;font-size:13px}
.inv-tbl th{text-align:right;padding:8px 6px;border-bottom:1px solid var(--bd);color:var(--t2);font-weight:600}
.inv-tbl td{padding:8px 6px;border-bottom:1px solid var(--bd)}
.rr{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);font-size:14px}
.rr:last-child{border-bottom:none}.rr .rl{color:var(--t2)}.rr .rv{font-weight:600}
.rr.rtot .rl{font-weight:700;color:var(--t1)}.rr.rtot .rv{color:var(--am);font-size:16px}
.dvd{height:1px;background:var(--bd);margin:4px 0}.pp{padding:16px}
.ck-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.ck-row:last-child{border-bottom:none}
.ck-row input[type=checkbox]{width:22px;height:22px;accent-color:var(--am);flex-shrink:0;cursor:pointer}
.ck-row label{font-size:15px;cursor:pointer;flex:1}
</style>
</head>
<body>
<div class="lo" id="lo"><div class="loader"></div><div class="lm" id="lm">جاري التحميل...</div></div>
<div id="toast"></div>
<div id="sc-login" style="display:none">
  <div class="lg-logo">📦</div>
  <div class="lg-title">المستودع</div>
  <div class="lg-sub">إدارة المخزون والفواتير<br>يتزامن مع Google Drive تبعك</div>
  <button class="lg-btn" id="loginBtn" onclick="startLogin()" disabled>جاري التحضير...</button>
  <div class="lg-note" id="lg-err"></div>
</div>
<div id="app" style="display:none">
  <div id="topbar">
    <span id="tb-back" onclick="goBack()">←</span>
    <span id="tb-title">المستودع</span>
    <span id="tb-save"></span>
    <span id="tb-gear" onclick="goSettings()">⚙️</span>
    <button id="tb-act" onclick="tbAct()"></button>
  </div>
  <div id="content">
    <div class="sc" id="sc-dash"><div id="dash-alerts"></div><div class="sg" id="dash-sum"></div><div class="sh"><span class="st">آخر الفواتير</span><button class="sa" onclick="navTo('inv')">كل الفواتير</button></div><div id="dash-invs"></div></div>
    <div class="sc" id="sc-stock"><div class="tabs" id="stk-tabs"></div><div class="srch"><span class="si">🔍</span><input type="text" placeholder="بحث..." oninput="stk_search=this.value;renderStkList()"></div><div id="stk-list"></div></div>
    <div class="sc" id="sc-mf"><div class="fs" id="mf-body"></div></div>
    <div class="sc" id="sc-md"><div id="md-body"></div></div>
    <div class="sc" id="sc-inv">
      <div class="tabs"><div class="tab active" onclick="inv_filter='all';renderInvList();setTA(this,'.sc#sc-inv .tab')">الكل</div><div class="tab" onclick="inv_filter='pending';renderInvList();setTA(this,'.sc#sc-inv .tab')">⏳ بالطريق</div><div class="tab" onclick="inv_filter='collected';renderInvList();setTA(this,'.sc#sc-inv .tab')">✅ مقبوضة</div></div>
      <div class="srch"><span class="si">🔍</span><input type="text" placeholder="زبون أو رقم..." oninput="inv_search=this.value;renderInvList()"></div>
      <div id="inv-list"></div>
    </div>
    <div class="sc" id="sc-newinv"><div class="fs" id="ni-body"></div></div>
    <div class="sc" id="sc-invd"><div id="invd-body"></div></div>
    <div class="sc" id="sc-cust"><div class="srch"><span class="si">🔍</span><input type="text" placeholder="اسم أو هاتف..." oninput="cust_search=this.value;renderCustList()"></div><div id="cust-list"></div></div>
    <div class="sc" id="sc-cf"><div class="fs" id="cf-body"></div></div>
    <div class="sc" id="sc-rep"><div id="rep-body"></div></div>
    <div class="sc" id="sc-ship"><div class="sh"><span class="st">الشحنات</span><button class="sa" onclick="push('sf');initSF(null)">+ شحنة</button></div><div id="ship-list"></div></div>
    <div class="sc" id="sc-sf"><div class="fs" id="sf-body"></div></div>
    <div class="sc" id="sc-set"><div class="fs" id="set-body"></div></div>
  </div>
  <nav id="nav">
    <div class="ni active" id="ni-dash" onclick="navTo('dash')"><span class="ic">🏠</span><span>الرئيسية</span></div>
    <div class="ni" id="ni-stock" onclick="navTo('stock')"><span class="ic">📦</span><span>المخزون</span></div>
    <div class="ni" id="ni-inv" onclick="navTo('inv')"><span class="ic">🧾</span><span>الفواتير</span></div>
    <div class="ni" id="ni-cust" onclick="navTo('cust')"><span class="ic">👥</span><span>الزباين</span></div>
    <div class="ni" id="ni-rep" onclick="navTo('rep')"><span class="ic">📊</span><span>تقارير</span></div>
  </nav>
</div>
<div class="mo" id="mo-item"><div class="ms"><div class="mh"></div><div class="mt" id="mo-item-title"></div><div class="fs" id="mo-item-body"></div></div></div>
<div class="mo" id="mo-confirm"><div class="ms"><div class="mh"></div><div class="mt" id="mc-title">تأكيد</div><div class="fs"><div id="mc-msg" style="color:var(--t2);margin-bottom:24px;line-height:1.7"></div><button class="sb" id="mc-ok">تأكيد</button><button class="db2" onclick="closeMo('mo-confirm')">إلغاء</button></div></div></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
'use strict';
const CLIENT_ID='723219791310-q5pihgpio27ksskt0mou2lm0lmrcejbv.apps.googleusercontent.com';
const SCOPE='https://www.googleapis.com/auth/drive.file';
const FNAME='warehouse-data.json';
const FOLDER='WarehouseApp';
const LSKEY='wh_login_v1';

let token=null,fileId=null,folderId=null,saveTimer=null,refreshTimer=null;
let D={version:1,settings:{companyName:'المستودع',partnerSplit:50,partnerName1:'الشريك الأول',partnerName2:'الشريك الثاني',lowStock:5,logo:''},shipments:[],models:[],customers:[],invoices:[],expenses:[],capital:[],withdrawals:[],invCounter:0};
let curScreen='dash',navTab='dash',stack=[],tbActFn=null;
let stk_search='',stk_ship='all',inv_filter='all',inv_search='',cust_search='';
let mf_model=null,mf_colors=[],sf_ship=null,cf_cust=null,ni_items=[];
let isAutoLogin=false;

// ── DRIVE ──
async function dreq(path,opts={}){
  const r=await fetch('https://www.googleapis.com/drive/v3'+path,{...opts,headers:{Authorization:'Bearer '+token,...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'HTTP '+r.status)}
  return r.status===204?null:r.json();
}
async function ensureFolder(){
  const r=await dreq(`/files?q=name='${FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id)`);
  if(r.files.length){folderId=r.files[0].id;return}
  const c=await dreq('/files',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:FOLDER,mimeType:'application/vnd.google-apps.folder'})});
  folderId=c.id;
}
async function loadData(){
  await ensureFolder();
  const r=await dreq(`/files?q=name='${FNAME}' and '${folderId}' in parents and trashed=false&fields=files(id)`);
  if(!r.files.length){await saveNow();return}
  fileId=r.files[0].id;
  const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+token}});
  const loaded=await res.json();
  D={...D,...loaded};
  ['shipments','models','customers','invoices','expenses','capital','withdrawals'].forEach(k=>{if(!Array.isArray(D[k]))D[k]=[]});
  if(!D.invCounter)D.invCounter=0;
  if(!D.settings)D.settings={};
  if(D.settings.logo===undefined)D.settings.logo='';
}
async function saveNow(){
  setSave('جاري الحفظ...');
  try{
    const body=JSON.stringify(D,null,2);
    if(!fileId){
      const meta=JSON.stringify({name:FNAME,parents:[folderId]});
      const form=new FormData();
      form.append('metadata',new Blob([meta],{type:'application/json'}));
      form.append('file',new Blob([body],{type:'application/json'}));
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+token},body:form});
      fileId=(await r.json()).id;
    }else{
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body});
    }
    setSave('✓ محفوظ');setTimeout(()=>setSave(''),3000);
  }catch(e){setSave('⚠ خطأ');toast('فشل الحفظ: '+e.message,1)}
}
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,1500)}
function setSave(t){document.getElementById('tb-save').textContent=t}

// ── AUTH ──
let tokenClient;
window.addEventListener('load',()=>{
  const chk=setInterval(()=>{
    if(window.google?.accounts?.oauth2){
      clearInterval(chk);
      tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPE,callback:onToken,error_callback:onTokenErr});
      const had=localStorage.getItem(LSKEY);
      if(had){
        isAutoLogin=true;
        document.getElementById('lm').textContent='جاري تسجيل الدخول تلقائياً...';
        tokenClient.requestAccessToken({prompt:''});
      }else{
        hideLoad();showLoginScreen();
      }
    }
  },300);
  setTimeout(()=>{if(!window.google?.accounts?.oauth2){hideLoad();showLoginScreen('تأكد من الاتصال بالإنترنت وأعد تحميل الصفحة')}},10000);
});
function onTokenErr(err){
  if(isAutoLogin){isAutoLogin=false;hideLoad();showLoginScreen();}
}
async function onToken(resp){
  if(resp.error){
    if(isAutoLogin){isAutoLogin=false;hideLoad();showLoginScreen();}
    else{toast('فشل تسجيل الدخول',1);}
    return;
  }
  token=resp.access_token;
  isAutoLogin=false;
  localStorage.setItem(LSKEY,'1');
  if(refreshTimer)clearTimeout(refreshTimer);
  refreshTimer=setTimeout(()=>tokenClient.requestAccessToken({prompt:''}),55*60*1000);
  document.getElementById('sc-login').style.display='none';
  showLoad('جاري تحميل البيانات...');
  try{
    await loadData();
    document.getElementById('app').style.display='flex';
    navTo('dash');
  }catch(e){
    toast('خطأ: '+e.message,1);
    showLoginScreen();
  }finally{hideLoad();}
}
function showLoginScreen(err){
  document.getElementById('sc-login').style.display='flex';
  const b=document.getElementById('loginBtn');
  b.disabled=false;b.textContent='ابدأ — سجّل دخول مع جوجل';
  document.getElementById('lg-err').textContent=err||'';
}
function startLogin(){tokenClient.requestAccessToken({prompt:'consent'})}
function logout(){
  if(refreshTimer)clearTimeout(refreshTimer);
  localStorage.removeItem(LSKEY);
  token=null;fileId=null;folderId=null;
  document.getElementById('app').style.display='none';
  showLoginScreen();
}

// ── NAV ──
const TABS=['dash','stock','inv','cust','rep'];
function navTo(tab){navTab=tab;stack=[];TABS.forEach(t=>{const el=document.getElementById('ni-'+t);if(el)el.classList.toggle('active',t===tab)});showSc(tab)}
function showSc(name){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('sc-'+name);if(el)el.classList.add('active');
  curScreen=name;document.getElementById('content').scrollTop=0;
  document.getElementById('tb-gear').style.display=name==='set'?'none':'block';
  const cfg={dash:['المستودع',false,'',null,renderDash],stock:['المخزون',false,'+ موديل',()=>{push('mf');initMF(null)},renderStock],inv:['الفواتير',false,'+ فاتورة',()=>{push('newinv');initNI()},renderInvList],cust:['الزباين',false,'+ زبون',()=>{push('cf');initCF(null)},renderCustList],rep:['تقارير',false,'',null,renderRep],ship:['الشحنات',false,'+ شحنة',()=>{push('sf');initSF(null)},renderShipList],set:['الإعدادات',true,'',null,renderSet]};
  const c=cfg[name];if(c){setTopbar(c[0],c[1],c[2],c[3]);if(c[4])c[4]()}
}
function push(name){stack.push(curScreen);showSc(name)}
function goBack(){stack.length?showSc(stack.pop()):navTo(navTab)}
function goSettings(){stack.push(curScreen);showSc('set')}
function setTopbar(title,back,act,fn){
  document.getElementById('tb-title').textContent=title;
  document.getElementById('tb-back').style.display=back?'block':'none';
  const a=document.getElementById('tb-act');

function renderDash(){
  const low=D.models.filter(m=>{const st=mStock(m);return st>0&&st<=(D.settings.lowStock||5)});
  const emp=D.models.filter(m=>mStock(m)===0&&m.colors.length>0);
  let alerts='';
  if(low.length)alerts+=`<div class="alert-b">⚠️ ${low.length} موديل قارب على النفاد: ${low.map(m=>m.code).join('، ')}</div>`;
  if(emp.length)alerts+=`<div class="alert-b" style="border-color:#555;color:var(--t3)">❌ ${emp.length} موديل نفد من المخزون</div>`;
  document.getElementById('dash-alerts').innerHTML=alerts;
  const cap=D.capital.reduce((s,c)=>s+c.amount,0);
  const wd=D.withdrawals.reduce((s,w)=>s+w.amount,0);
  const exp=D.expenses.reduce((s,e)=>s+e.amount,0);
  const shipInv=D.shipments.reduce((s,sh)=>s+(sh.pc||0)+(sh.sc||0)+(sh.cc||0)+(sh.kc||0),0);
  const col=D.invoices.filter(i=>i.status==='collected');
  const pen=D.invoices.filter(i=>i.status==='pending');
  const rev=col.reduce((s,i)=>s+i.total,0);
  const penAmt=pen.reduce((s,i)=>s+i.total,0);
  const cogs=col.reduce((s,i)=>s+(i.cost||0),0);
  const np=rev-cogs-exp;
  const cash=cap+rev-shipInv-exp-wd;
  const stkVal=D.models.reduce((s,m)=>s+mStock(m)*mCost(m),0);
  document.getElementById('dash-sum').innerHTML=`
    <div class="sc-card"><div class="lbl">💵 الكاش الجاهز</div><div class="val" style="color:var(--am)">${$m(cash)}</div></div>
    <div class="sc-card"><div class="lbl">⏳ بالطريق</div><div class="val" style="color:var(--t2)">${$m(penAmt)}</div><div class="sub">${pen.length} فاتورة</div></div>
    <div class="sc-card"><div class="lbl">📦 قيمة المخزون</div><div class="val">${$m(stkVal)}</div><div class="sub">${D.models.reduce((s,m)=>s+mStock(m),0)} قطعة</div></div>
    <div class="sc-card"><div class="lbl">📈 صافي الربح</div><div class="val" style="color:${np>=0?'var(--gr)':'var(--rd)'}">${$m(np)}</div></div>`;
  const recent=[...D.invoices].sort((a,b)=>b.num-a.num).slice(0,5);
  document.getElementById('dash-invs').innerHTML=recent.length?recent.map(invCard).join(''):`<div class="es"><div class="ic">🧾</div><div class="msg">لا يوجد فواتير بعد</div></div>`;
}

function genCode(){return 'M'+String(D.models.length+1).padStart(3,'0')}
function renderClr(){document.getElementById('cl-list').innerHTML=mf_colors.map((c,i)=>`<div class="cl-row"><input type="text" value="${c.color||''}" placeholder="اسم اللون" oninput="mf_colors[${i}].color=this.value"><input type="number" class="qi" value="${c.stock||0}" min="0" oninput="mf_colors[${i}].stock=+this.value"><button class="db" onclick="remClr(${i})">✕</button></div>`).join('')}
function addClr(){mf_colors.push({color:'',stock:0});renderClr()}
function remClr(i){if(mf_colors.length===1){toast('لازم لون واحد على الأقل',1);return}mf_colors.splice(i,1);renderClr()}
function updMFC(){
  const bc=+document.getElementById('mf-bc')?.value||0,sp=+document.getElementById('mf-sp')?.value||0;
  const shEl=document.getElementById('mf-sh'),ex=shEl?gShip(shEl.value)?.extraPP||0:0;
  const tc=bc+ex,pr=sp-tc,pct=tc>0?((pr/tc)*100).toFixed(1):0;
  document.getElementById('mf-calc').innerHTML=`<div class="cr"><span>سعر الشراء</span><span>${$m(bc)}</span></div>${ex?`<div class="cr"><span>تكلفة إضافية</span><span>${$m(ex)}</span></div>`:''}<div class="cr tot"><span>التكلفة الكاملة</span><span>${$m(tc)}</span></div>${sp?`<div class="cr" style="color:${pr>=0?'var(--gr)':'var(--rd)'}"><span>الربح/قطعة</span><span>${$m(pr)} (${pct}%)</span></div>`:''}`;
}
function saveMF(){
  const name=document.getElementById('mf-name')?.value?.trim(),code=document.getElementById('mf-code')?.value?.trim().toUpperCase();
  const bc=+document.getElementById('mf-bc')?.value||0,sp=+document.getElementById('mf-sp')?.value;
  const notes=document.getElementById('mf-notes')?.value?.trim()||'';
  const shEl=document.getElementById('mf-sh'),shipmentId=shEl?shEl.value:'';
  if(!name){toast('الاسم مطلوب',1);return}if(!code){toast('الكود مطلوب',1);return}if(!sp){toast('سعر البيع مطلوب',1);return}
  if(mf_colors.some(c=>!c.color.trim())){toast('أسماء الألوان مطلوبة',1);return}
  if(D.models.find(m=>m.code===code&&m.id!==mf_model?.id)){toast('الكود '+code+' مستخدم',1);return}
  const colors=mf_colors.map(c=>({color:c.color.trim(),stock:+c.stock||0}));
  if(mf_model){Object.assign(mf_model,{name,code,baseCost:bc,salePrice:sp,shipmentId,notes,colors})}
  else{D.models.push({id:uid(),name,code,baseCost:bc,salePrice:sp,shipmentId,notes,colors,createdAt:today()})}
  scheduleSave();toast(mf_model?'تم التعديل ✓':'تمت الإضافة ✓');goBack();if(mf_model)goBack();
}

function saveSF(){

function openItemMo(){

function updItemClr(){

  document.getElementById('it-cf').style.display='block';updItemStk();
}
function updItemStk(){
  const m=gModel(document.getElementById('it-m').value),color=document.getElementById('it-c')?.value;
  const si=document.getElementById('it-si');if(!m||!color){si.innerHTML='';return}
  const c=m.colors.find(cc=>cc.color===color),stk=c?c.stock:0;
  si.innerHTML=`<div style="background:${stk===0?'#2a1515':stk<=5?'#3a2510':'var(--bg3)'};border:1px solid var(--bd);border-radius:8px;padding:8px 14px;font-size:13px;color:${stk===0?'var(--rd)':stk<=5?'var(--am)':'var(--t2)'}">${stk===0?'❌ نفد من المخزون':stk<=5?'⚠️ متوفر: '+stk+' قطعة':'✓ متوفر: '+stk+' قطعة'}</div>`;

function addItem(){
  const mid=document.getElementById('it-m').value,color=document.getElementById('it-c')?.value;
  const qty=+document.getElementById('it-q').value,price=+document.getElementById('it-p').value;
  if(!mid){toast('اختر موديل',1);return}if(!color){toast('اختر لون',1);return}
  if(qty<=0){toast('الكمية يجب أن تكون أكبر من صفر',1);return}if(!price){toast('السعر مطلوب',1);return}
  const m=gModel(mid),c=m.colors.find(cc=>cc.color===color);
  if(!c||c.stock<qty){toast('⚠️ الكمية المطلوبة ('+qty+') أكبر من المتوفر ('+(c?c.stock:0)+')',1);return}
  ni_items.push({modelId:mid,code:m.code,mname:m.name,color,qty,price,lineTotal:price*qty,lineCost:mCost(m)*qty});
  closeMo('mo-item');renderNIItems();
}
function renderNIItems(){
  const el=document.getElementById('ni-items'),te=document.getElementById('ni-tots');

  el.innerHTML=ni_items.map((it,i)=>`<div class="li" style="margin-bottom:8px"><div class="li-body"><div class="li-title">${it.code} — ${it.mname}</div><div class="li-sub">${it.color} • ${it.qty} قطعة × ${$m(it.price)}</div></div><div class="li-r" style="display:flex;align-items:center;gap:8px"><div class="li-amt">${$m(it.lineTotal)}</div><button onclick="ni_items.splice(${i},1);renderNIItems()" style="background:none;border:none;color:var(--rd);font-size:20px;cursor:pointer;line-height:1">✕</button></div></div>`).join('');
  te.style.display='block';
  te.innerHTML=`<div class="cr"><span style="color:var(--t2)">${ni_items.reduce((s,i)=>s+i.qty,0)} قطعة — مجموع الأصناف</span><span>${$m(itemsTotal)}</span></div>${disc>0?`<div class="cr" style="color:var(--rd)"><span>خصم</span><span>- ${$m(disc)}</span></div>`:''}<div class="cr tot"><span>الإجمالي النهائي</span><span>${$m(total)}</span></div><div class="cr" style="color:var(--gr)"><span>الربح المتوقع</span><span>${$m(profit)}</span></div>`;
}
function saveInv(){
  if(!ni_items.length){toast('أضف صنف واحد على الأقل',1);return}
  let custId=document.getElementById('ni-cust').value,custName='';
  if(custId==='__new'){const nn=document.getElementById('ni-nn')?.value?.trim();if(!nn){toast('أدخل اسم الزبون',1);return}const nc={id:uid(),name:nn,phone:'',address:'',notes:'',createdAt:today()};D.customers.push(nc);custId=nc.id;custName=nn;}
  else if(custId){custName=gCust(custId)?.name||''}else{toast('اختر الزبون',1);return}
  const date=document.getElementById('ni-date').value||today(),notes=document.getElementById('ni-notes')?.value?.trim()||'';
  const disc=+document.getElementById('ni-disc')?.value||0;
  const itemsTotal=ni_items.reduce((s,i)=>s+i.lineTotal,0),cost=ni_items.reduce((s,i)=>s+i.lineCost,0);
  const total=Math.max(0,itemsTotal-disc),profit=total-cost;
  ni_items.forEach(it=>{const m=gModel(it.modelId);if(m){const c=m.colors.find(cc=>cc.color===it.color);if(c)c.stock=Math.max(0,c.stock-it.qty)}});
  D.invCounter=(D.invCounter||0)+1;
  D.invoices.push({id:uid(),num:D.invCounter,date,customerId:custId,custName,items:ni_items.map(it=>({...it})),itemsTotal,discount:disc,total,cost,profit,status:'pending',collectedDate:null,notes,createdAt:today()});

}

function delInv(id){confirm2('حذف الفاتورة','الكميات المخصومة لن تعود للمخزون. متأكد؟',()=>{D.invoices=D.invoices.filter(i=>i.id!==id);scheduleSave();goBack();toast('تم الحذف')})}

function renderRep(){
  const cap=D.capital.reduce((s,c)=>s+c.amount,0),wd=D.withdrawals.reduce((s,w)=>s+w.amount,0);
  const exp=D.expenses.reduce((s,e)=>s+e.amount,0),shipInv=D.shipments.reduce((s,sh)=>s+(sh.pc||0)+(sh.sc||0)+(sh.cc||0)+(sh.kc||0),0);
  const col=D.invoices.filter(i=>i.status==='collected'),pen=D.invoices.filter(i=>i.status==='pending');
  const rev=col.reduce((s,i)=>s+i.total,0),penAmt=pen.reduce((s,i)=>s+i.total,0);
  const cogs=col.reduce((s,i)=>s+(i.cost||0),0),gp=rev-cogs,np=gp-exp;
  const cash=cap+rev-shipInv-exp-wd,stkVal=D.models.reduce((s,m)=>s+mStock(m)*mCost(m),0);
  const spl=(D.settings.partnerSplit||50)/100,p1=np*spl,p2=np*(1-spl);
  const sold={};D.invoices.forEach(inv=>inv.items.forEach(it=>{if(!sold[it.code])sold[it.code]={name:it.mname,qty:0};sold[it.code].qty+=it.qty}));
  const topSold=Object.entries(sold).sort((a,b)=>b[1].qty-a[1].qty).slice(0,3);
  document.getElementById('rep-body').innerHTML=`<div class="pp">
    <div class="sh" style="padding:0 0 10px"><span class="st">💵 السيولة</span></div>
    <div class="card" style="margin:0 0 16px"><div class="rr"><span class="rl">كاش جاهز بالصندوق</span><span class="rv" style="color:var(--am)">${$m(cash)}</span></div><div class="rr"><span class="rl">كاش بالطريق (${pen.length} فاتورة)</span><span class="rv" style="color:var(--t2)">${$m(penAmt)}</span></div><div class="rr rtot"><span class="rl">إجمالي السيولة</span><span class="rv">${$m(cash+penAmt)}</span></div></div>
    <div class="sh" style="padding:12px 0 10px"><span class="st">📈 الأرباح والخسائر</span></div>
    <div class="card" style="margin:0 0 16px"><div class="rr"><span class="rl">إيرادات مقبوضة</span><span class="rv" style="color:var(--gr)">${$m(rev)}</span></div><div class="rr"><span class="rl">تكلفة البضاعة المباعة</span><span class="rv">${$m(cogs)}</span></div><div class="rr"><span class="rl">الربح الإجمالي</span><span class="rv">${$m(gp)}</span></div><div class="rr"><span class="rl">المصاريف التشغيلية</span><span class="rv">${$m(exp)}</span></div><div class="rr rtot"><span class="rl">✨ صافي الربح</span><span class="rv" style="color:${np>=0?'var(--gr)':'var(--rd)'}">${$m(np)}</span></div></div>
    <div class="sh" style="padding:12px 0 10px"><span class="st">🤝 توزيع الأرباح</span></div>
    <div class="card" style="margin:0 0 16px"><div class="rr"><span class="rl">${D.settings.partnerName1||'الشريك الأول'} (${Math.round(spl*100)}%)</span><span class="rv" style="color:var(--gr)">${$m(p1)}</span></div><div class="rr"><span class="rl">${D.settings.partnerName2||'الشريك الثاني'} (${Math.round((1-spl)*100)}%)</span><span class="rv" style="color:var(--gr)">${$m(p2)}</span></div></div>
    <div class="sh" style="padding:12px 0 10px"><span class="st">📦 المخزون</span></div>
    <div class="card" style="margin:0 0 16px"><div class="rr"><span class="rl">قيمة المخزون المتبقي</span><span class="rv">${$m(stkVal)}</span></div><div class="rr"><span class="rl">إجمالي القطع المتبقية</span><span class="rv">${D.models.reduce((s,m)=>s+mStock(m),0)} قطعة</span></div><div class="rr rtot"><span class="rl">إجمالي الأصول</span><span class="rv">${$m(cash+penAmt+stkVal)}</span></div></div>
    <div class="sh" style="padding:12px 0 10px"><span class="st">💰 رأس المال</span></div>
    <div class="card" style="margin:0 0 16px"><div class="rr"><span class="rl">رأس المال المُدخل</span><span class="rv">${$m(cap)}</span></div><div class="rr"><span class="rl">تكاليف الشحنات</span><span class="rv">${$m(shipInv)}</span></div><div class="rr"><span class="rl">سحوبات الشركاء</span><span class="rv">${$m(wd)}</span></div></div>
    ${topSold.length?`<div class="sh" style="padding:12px 0 10px"><span class="st">🏆 الأكثر مبيعاً</span></div><div class="card" style="margin:0 0 16px">${topSold.map(([code,s],i)=>`<div class="rr"><span class="rl">${i===0?'🥇':i===1?'🥈':'🥉'} ${code} — ${s.name}</span><span class="rv">${s.qty} قطعة</span></div>`).join('')}</div>`:''}

    <button class="sb" onclick="qModal('cap')">💰 إضافة رأس مال</button>

    </div>
    <button class="sb" onclick="generateCatalog()">📋 إنشاء الكتالوج</button>
    <button class="db2" onclick="closeMo('mo-item')">إلغاء</button>`;
  openMo('mo-item');
}
function generateCatalog(){
  const shipFilter=document.getElementById('cat-ship')?.value||'';
  const showPrice=document.getElementById('cat-price').checked;
  const showStock=document.getElementById('cat-stock').checked;
  const inStockOnly=document.getElementById('cat-instock').checked;
  let models=D.models;
  if(shipFilter)models=models.filter(m=>m.shipmentId===shipFilter);
  if(inStockOnly)models=models.filter(m=>mStock(m)>0);
  if(!models.length){toast('لا يوجد موديلات بهذه الفلترة',1);return}
  const logo=D.settings.logo?`<img src="${D.settings.logo}" style="max-height:70px;max-width:140px;object-fit:contain;margin-bottom:8px"><br>`:'';
  const cat=`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${D.settings.companyName} — الكتالوج</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Tahoma,sans-serif;background:#f7f7f7;color:#222;padding:20px}
.hdr{text-align:center;margin-bottom:24px}.hdr h1{font-size:22px;margin-bottom:4px}.hdr p{color:#777;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px}
.code{font-size:11px;color:#aaa;margin-bottom:3px}.name{font-weight:700;font-size:14px;margin-bottom:8px;line-height:1.3}
.colors{font-size:12px;color:#555;line-height:1.6}.price{margin-top:8px;font-weight:700;color:#c98a4b;font-size:15px}
.stk{font-size:11px;color:#5fb583;margin-top:2px}
@media print{body{background:#fff;padding:10px}.grid{grid-template-columns:repeat(4,1fr)}}</style></head>
<body><div class="hdr">${logo}<h1>${D.settings.companyName}</h1><p>الكتالوج • ${new Date().toLocaleDateString('ar-SY')} • ${models.length} موديل</p></div>
<div class="grid">${models.map(m=>`<div class="card"><div class="code">${m.code}</div><div class="name">${m.name}</div><div class="colors">${m.colors.map(c=>`${c.color}${showStock?' ('+c.stock+')':''}`).join('<br>')}</div>${showPrice?`<div class="price">${$m(m.salePrice)}</div>`:''}</div>`).join('')}</div>
<div style="text-align:center;margin-top:24px;color:#aaa;font-size:12px">يمكنك طباعة هذه الصفحة من المتصفح (Ctrl+P أو Share → Print)</div>
</body></html>`;
  const w=window.open('','_blank');if(!w){toast('يرجى السماح بالنوافذ المنبثقة في المتصفح',1);return}
  w.document.write(cat);w.document.close();closeMo('mo-item');
}

// ── SETTINGS ──
function renderSet(){
  document.getElementById('set-body').innerHTML=`
    ${D.settings.logo?`<div style="text-align:center;margin-bottom:16px"><img src="${D.settings.logo}" style="max-height:80px;max-width:160px;object-fit:contain;border:1px solid var(--bd);border-radius:10px;padding:8px;background:var(--bg2)"><br><button onclick="removeLogo()" style="background:none;border:none;color:var(--rd);font-size:13px;cursor:pointer;margin-top:8px">✕ حذف اللوغو</button></div>`:`<div class="f"><label>لوغو الشركة (اختياري)</label><input type="file" id="logo-inp" accept="image/*" onchange="handleLogo(this.files[0])" style="padding:8px"></div>`}
    <div class="f"><label>اسم الشركة / المتجر</label><input type="text" id="s-cn" value="${D.settings.companyName||'المستودع'}"></div>
    <div class="f"><label>اسم الشريك الأول</label><input type="text" id="s-p1" value="${D.settings.partnerName1||'الشريك الأول'}"></div>
    <div class="f"><label>اسم الشريك الثاني</label><input type="text" id="s-p2" value="${D.settings.partnerName2||'الشريك الثاني'}"></div>
    <div class="f"><label>نسبة الشريك الأول في الأرباح (%)</label><input type="number" id="s-sp" value="${D.settings.partnerSplit||50}" min="0" max="100"></div>
    <div class="f"><label>حد تنبيه نفاذ المخزون (قطعة)</label><input type="number" id="s-ls" value="${D.settings.lowStock||5}" min="1"></div>
    <button class="sb" onclick="saveSet()">✓ حفظ الإعدادات</button>
    <button class="sb2" onclick="confirm2('تسجيل الخروج','سيتم تسجيل خروجك. بياناتك محفوظة على Drive.',logout)">🚪 تسجيل الخروج</button>
    <div style="margin-top:16px;background:var(--bg3);border-radius:12px;padding:16px;font-size:13px;color:var(--t3);line-height:1.8">
      📁 البيانات على Drive تبعك<br>مجلد: <span style="color:var(--am)">WarehouseApp/warehouse-data.json</span><br><br>
      🔜 المرحلة القادمة:<br>• رفع صور الموديلات ومطابقة تلقائية<br>• تصدير الفواتير PDF<br>• تصدير تقارير Excel
    </div>`;
}
function handleLogo(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=300,r=Math.min(1,max/Math.max(img.width,img.height));
      canvas.width=Math.round(img.width*r);canvas.height=Math.round(img.height*r);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      D.settings.logo=canvas.toDataURL('image/jpeg',0.75);
      scheduleSave();renderSet();toast('✓ تم رفع اللوغو');
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}
function removeLogo(){confirm2('حذف اللوغو','هل أنت متأكد؟',()=>{D.settings.logo='';scheduleSave();renderSet();toast('تم حذف اللوغو')})}
function saveSet(){
  D.settings.companyName=document.getElementById('s-cn').value.trim()||'المستودع';
  D.settings.partnerName1=document.getElementById('s-p1').value.trim()||'الشريك الأول';
  D.settings.partnerName2=document.getElementById('s-p2').value.trim()||'الشريك الثاني';
  D.settings.partnerSplit=Math.min(100,Math.max(0,+document.getElementById('s-sp').value||50));
  D.settings.lowStock=Math.max(1,+document.getElementById('s-ls').value||5);
  scheduleSave();toast('✓ تم حفظ الإعدادات');
}
</script>
</body>
</html>
