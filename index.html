.ph-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}

.ph-thumb img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--bd)}
.ph-del{position:absolute;top:-6px;left:-6px;background:#2a1a1a;border:1px solid var(--rd);border-radius:50%;width:22px;height:22px;color:var(--rd);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.add-ph{width:80px;height:80px;background:var(--bg3);border:1px dashed var(--bd);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--am);cursor:pointer}
.vgrid{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:4px}
.vgrid table{border-collapse:collapse;font-size:12px}
.vgrid th,.vgrid td{padding:4px}
.vgrid th{text-align:center;color:var(--am);font-weight:700;white-space:nowrap;min-width:52px}
.vgrid .clbl{text-align:right;font-weight:600;color:var(--t1);white-space:nowrap;padding-right:10px}
.vgrid input{width:50px;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:6px 4px;color:var(--t1);font-size:13px;text-align:center;outline:none;-webkit-appearance:none}
.vgrid input:focus{border-color:var(--am)}
</style>

<script>
'use strict';
const CLIENT_ID='723219791310-q5pihgpio27ksskt0mou2lm0lmrcejbv.apps.googleusercontent.com';
const SCOPE='https://www.googleapis.com/auth/drive.file';
const FNAME='warehouse-data.json';
const FOLDER='WarehouseApp';
const LSKEY='wh_login_v1';
const LDKEY='wh_data_v1';
const DEFAULT_SIZES=['S','M','L','XL','2XL','3XL','4XL'];

let token=null,fileId=null,folderId=null,saveTimer=null,refreshTimer=null,retryTimer=null,isSynced=true,isSaving=false;
let D={version:2,settings:{companyName:'المستودع',partnerSplit:50,partnerName1:'الشريك الأول',partnerName2:'الشريك الثاني',lowStock:5,logo:''},shipments:[],models:[],customers:[],invoices:[],expenses:[],capital:[],withdrawals:[],invCounter:0};
let curScreen='dash',navTab='dash',stack=[],tbActFn=null;
let stk_search='',stk_ship='all',inv_filter='all',inv_search='',cust_search='';
let mf_model=null,mf_colors=[],mf_sizes=[],mf_variants={},mf_photos=[];
let hashCache=null;
let stkPage=1,invPage=1;
let sf_ship=null,cf_cust=null,ni_items=[];
let isAutoLogin=false;

// ── DRIVE ──
async function dreq(path,opts={}){
  const r=await fetch('https://www.googleapis.com/drive/v3'+path,{...opts,headers:{Authorization:'Bearer '+token,...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'HTTP '+r.status)}
  return r.status===204?null:r.json();
}
async function ensureFolder(){
  const r=await dreq(`/files?q=name='${FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id)`);
  if(r.files.length){folderId=r.files[0].id;return}
  const c=await dreq('/files',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:FOLDER,mimeType:'application/vnd.google-apps.folder'})});
  folderId=c.id;
}
// ── LOCAL CACHE ──
function localSave(synced){
  try{localStorage.setItem(LDKEY,JSON.stringify({data:D,synced:!!synced,savedAt:Date.now()}))}catch(e){}
}
function localLoad(){
  try{const raw=localStorage.getItem(LDKEY);return raw?JSON.parse(raw):null}catch(e){return null}
}
function normalizeD(){
  ['shipments','models','customers','invoices','expenses','capital','withdrawals'].forEach(k=>{if(!Array.isArray(D[k]))D[k]=[]});
  if(!D.invCounter)D.invCounter=0;if(!D.settings)D.settings={};if(D.settings.logo===undefined)D.settings.logo='';
}
async function loadData(){
  const cached=localLoad();
  if(cached && cached.synced===false){
    // آخر جلسة فيها تغييرات ما توصلت عالدرايف — نعتمدها كأحدث نسخة ونحاول نرفعها
    D={...D,...cached.data};normalizeD();
    await ensureFolder();
    const r=await dreq(`/files?q=name='${FNAME}' and '${folderId}' in parents and trashed=false&fields=files(id)`);
    if(r.files.length)fileId=r.files[0].id;
    scheduleSave();
    return;
  }
  await ensureFolder();
  const r=await dreq(`/files?q=name='${FNAME}' and '${folderId}' in parents and trashed=false&fields=files(id)`);
  if(!r.files.length){normalizeD();localSave(false);await saveNow();return}
  fileId=r.files[0].id;
  const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+token}});
  const loaded=await res.json();
  D={...D,...loaded};
  normalizeD();
  localSave(true);
}
async function saveNow(){
  if(isSaving)return; // تجنب رفعتين متزامنتين
  if(!navigator.onLine){setSave('⚠ لا يوجد اتصال — محفوظ محلياً');scheduleRetry();return}
  isSaving=true;
  setSave('جاري الرفع...');
  try{
    const body=JSON.stringify(D,null,2);
    if(!fileId){
      await ensureFolder();
      const meta=JSON.stringify({name:FNAME,parents:[folderId]});
      const form=new FormData();
      form.append('metadata',new Blob([meta],{type:'application/json'}));
      form.append('file',new Blob([body],{type:'application/json'}));
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+token},body:form});
      if(!r.ok)throw new Error('HTTP '+r.status);
      fileId=(await r.json()).id;
    }else{
      const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body});
      if(!r.ok)throw new Error('HTTP '+r.status);
    }
    isSynced=true;localSave(true);
    setSave('✓ متزامن');setTimeout(()=>setSave(''),3000);
    if(retryTimer){clearTimeout(retryTimer);retryTimer=null}
  }catch(e){
    setSave('⚠ لم يتم الرفع — سيعاد المحاولة');
    scheduleRetry();
  }finally{isSaving=false}
}
function scheduleRetry(){
  if(retryTimer)clearTimeout(retryTimer);

// ── IMAGE MATCHING (pHash) ──
async function imgHash(src){
  return new Promise(resolve=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      const cv=document.createElement('canvas');cv.width=8;cv.height=8;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,8,8);
      const data=ctx.getImageData(0,0,8,8).data;
      const grays=[];
      for(let i=0;i<64;i++)grays.push(0.299*data[i*4]+0.587*data[i*4+1]+0.114*data[i*4+2]);
      const mean=grays.reduce((s,v)=>s+v,0)/64;
      resolve(grays.map(v=>v>=mean?1:0));
    };
    img.onerror=()=>resolve(null);
    img.src=src;
  });
}
function hamming(a,b){let d=0;for(let i=0;i<a.length;i++)if(a[i]!==b[i])d++;return d}
async function buildHashCache(){
  hashCache=new Map();
  for(const m of D.models){
    if(!m.photos?.length)continue;
    const hashes=[];
    for(const p of m.photos){const h=await imgHash(p);if(h)hashes.push(h)}
    if(hashes.length)hashCache.set(m.id,hashes);
  }
}
async function doImageMatch(input){
  const file=input.files[0];if(!file)return;
  const res=document.getElementById('match-results');
  if(!res)return;
  res.innerHTML='<div style="color:var(--t2);font-size:13px;padding:8px 0;text-align:center">⏳ جاري البحث...</div>';
  if(!hashCache)await buildHashCache();
  const url=URL.createObjectURL(file);
  const qh=await imgHash(url);
  URL.revokeObjectURL(url);
  input.value='';
  if(!qh){res.innerHTML='<div style="color:var(--rd);font-size:13px;padding:8px 0">تعذر قراءة الصورة</div>';return}
  const matches=[];
  for(const m of D.models){
    const hashes=hashCache.get(m.id);
    if(!hashes?.length)continue;
    const minDist=Math.min(...hashes.map(h=>hamming(qh,h)));
    matches.push({m,dist:minDist});
  }
  matches.sort((a,b)=>a.dist-b.dist);
  const top=matches.filter(x=>x.dist<=22).slice(0,5);
  if(!top.length){
    res.innerHTML='<div style="color:var(--rd);font-size:13px;padding:8px 0">⚠️ لم يتم العثور على موديل مطابق — جرب صورة أوضح</div>';
    return;
  }
  res.innerHTML=top.map(({m,dist})=>{
    const conf=dist<=5?'✓✓ تطابق ممتاز':dist<=10?'✓ تطابق جيد':'تطابق محتمل';
    const cc=dist<=5?'var(--gr)':dist<=10?'var(--am)':'var(--t3)';
    const th=m.photos?.[0]?`<img src="${m.photos[0]}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0">`:'<div style="width:52px;height:52px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">👗</div>';
    return `<div onclick="selectMatchedModel('${m.id}')" style="display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:10px;cursor:pointer;margin-bottom:8px;active:background:var(--bg3)">${th}<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</div><div style="color:var(--am);font-size:13px;font-weight:700">${m.code}</div><div style="font-size:11px;color:${cc}">${conf} (${dist})</div></div><div style="font-size:22px;color:var(--am)">←</div></div>`;
  }).join('');
}

function initMF(mid){
  mf_model=mid?gModel(mid):null;const m=mf_model;
  if(m){
    if(m.colors?.length&&typeof m.colors[0]==='string'){mf_colors=[...m.colors]}
    else if(m.colors?.length&&typeof m.colors[0]==='object'){mf_colors=m.colors.map(c=>c.color)}
    else{mf_colors=[]}
    mf_sizes=m.sizes?[...m.sizes]:[];
    mf_photos=m.photos?[...m.photos]:[];
    mf_variants={};
    if(m.variants?.length){
      m.variants.forEach(v=>{
        const ci=mf_colors.indexOf(v.color);
        if(mf_sizes.length){const si=mf_sizes.indexOf(v.size);if(ci>=0&&si>=0)mf_variants[`${ci}_${si}`]=v.stock||0}
        else{if(ci>=0)mf_variants[`${ci}_0`]=v.stock||0}
      });
    }else if(m.colors?.length&&typeof m.colors[0]==='object'){
      m.colors.forEach((c,ci)=>{mf_variants[`${ci}_0`]=c.stock||0});
    }
  }else{mf_colors=[];mf_sizes=[];mf_variants={};mf_photos=[]}
  const sopts=D.shipments.map(s=>`<option value="${s.id}" ${m&&m.shipmentId===s.id?'selected':''}>${s.name}</option>`).join('');
  document.getElementById('mf-body').innerHTML=`

    <div class="f3">
      <div class="f"><label>سعر الشراء ($)</label><input type="number" id="mf-bc" value="${m?m.baseCost||'':''}" placeholder="0" step="0.01" oninput="updMFC()"></div>
      <div class="f"><label>التكاليف ($)<small style="color:var(--t3);display:block;font-weight:400">شحن+عمولة+ضرائب</small></label><input type="number" id="mf-tc" value="${m?(m.totalCosts!==undefined?m.totalCosts:((m.shippingCost||0)+(m.commission||0)))||'':''}" placeholder="0" step="0.01" oninput="updMFC()"></div>

function renderPhotoGrid(){
  const g=document.getElementById('ph-grid');if(!g)return;
  let html=mf_photos.map((p,i)=>`<div class="ph-thumb"><img src="${p}"><button class="ph-del" onclick="mf_photos.splice(${i},1);renderPhotoGrid()">✕</button></div>`).join('');
  if(mf_photos.length<15)html+=`<div class="add-ph" onclick="document.getElementById('ph-inp').click()">+</div>`;

function handlePhoto(inp){
  const MAX=15;
  if(!inp.files.length)return;
  const remaining=MAX-mf_photos.length;
  if(remaining<=0){toast('وصلت للحد الأقصى ('+MAX+' صور)',1);return}
  const files=Array.from(inp.files).slice(0,remaining);
  if(inp.files.length>remaining)toast('تم أخذ أول '+remaining+' صورة فقط (الحد '+MAX+')',0);
  let done=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const max=600,r=Math.min(1,max/Math.max(img.width,img.height));
        canvas.width=Math.round(img.width*r);canvas.height=Math.round(img.height*r);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        mf_photos.push(canvas.toDataURL('image/jpeg',0.72));
        done++;if(done===files.length)renderPhotoGrid();
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });
  inp.value='';
}

function saveMF(){
  const name=document.getElementById('mf-name')?.value?.trim();
  const code=document.getElementById('mf-code')?.value?.trim().toUpperCase();
  const baseCost=+document.getElementById('mf-bc')?.value||0;
  const totalCosts=+document.getElementById('mf-tc')?.value||0;
  const salePrice=+document.getElementById('mf-sp')?.value;
  const notes=document.getElementById('mf-notes')?.value?.trim()||'';
  const shEl=document.getElementById('mf-sh'),shipmentId=shEl?shEl.value:'';
  if(!name){toast('الاسم مطلوب',1);return}if(!code){toast('الكود مطلوب',1);return}if(!salePrice){toast('سعر البيع مطلوب',1);return}
  if(!mf_colors.length||mf_colors.some(c=>!c.trim())){toast('أسماء الألوان مطلوبة',1);return}
  if(D.models.find(m=>m.code===code&&m.id!==mf_model?.id)){toast('الكود '+code+' مستخدم',1);return}
  const colors=mf_colors.map(c=>c.trim());
  const sizes=[...mf_sizes];
  const variants=[];
  if(sizes.length){
    colors.forEach((color,ci)=>sizes.forEach((size,si)=>{variants.push({color,size,stock:mf_variants[`${ci}_${si}`]||0})}));
  }else{
    colors.forEach((color,ci)=>variants.push({color,size:'',stock:mf_variants[`${ci}_0`]||0}));
  }
  const data={name,code,baseCost,totalCosts,salePrice,shipmentId,photos:[...mf_photos],colors,sizes,variants,notes};
  if(mf_model){Object.assign(mf_model,data)}
  else{D.models.push({id:uid(),...data,createdAt:today()})}
  scheduleSave();toast(mf_model?'تم التعديل ✓':'تمت الإضافة ✓');goBack();if(mf_model)goBack();
}

function updItemColor(){
  const m=gModel(document.getElementById('it-m').value);
  document.getElementById('it-cf').style.display='none';document.getElementById('it-sf').style.display='none';document.getElementById('it-si').innerHTML='';
  if(!m)return;
  document.getElementById('it-p').value=m.salePrice;
  let colors=[];
  if(m.variants?.length)colors=[...new Set(m.variants.map(v=>v.color))];
  else if(m.colors?.length)colors=typeof m.colors[0]==='string'?m.colors:m.colors.map(c=>c.color);
  document.getElementById('it-c').innerHTML=colors.map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('it-cf').style.display='block';
  updItemSize();
}
function updItemSize(){
  const m=gModel(document.getElementById('it-m').value);
  const color=document.getElementById('it-c')?.value;
  document.getElementById('it-sf').style.display='none';document.getElementById('it-si').innerHTML='';
  if(!m||!color)return;
  if(m.variants?.length&&m.sizes?.length){
    const sizesForColor=m.variants.filter(v=>v.color===color).map(v=>({size:v.size,stock:v.stock}));
    if(sizesForColor.some(v=>v.size)){
      document.getElementById('it-s').innerHTML=sizesForColor.map(v=>`<option value="${v.size}">${v.size} (${v.stock} متوفر)</option>`).join('');
      document.getElementById('it-sf').style.display='block';
    }
  }
  updItemStk();
}
function updItemStk(){
  const m=gModel(document.getElementById('it-m').value);
  const color=document.getElementById('it-c')?.value;
  const size=document.getElementById('it-s')?.value||'';
  const si=document.getElementById('it-si');
  if(!m||!color){si.innerHTML='';return}
  let stk=0;
  if(m.variants?.length){
    const v=m.variants.find(v=>v.color===color&&(size?v.size===size:true));
    stk=v?v.stock:0;
  }else if(m.colors?.length&&typeof m.colors[0]==='object'){
    stk=m.colors.find(c=>c.color===color)?.stock||0;
  }
  si.innerHTML=`<div style="background:${stk===0?'#2a1515':stk<=5?'#3a2510':'var(--bg3)'};border:1px solid var(--bd);border-radius:8px;padding:8px 14px;font-size:13px;color:${stk===0?'var(--rd)':stk<=5?'var(--am)':'var(--t2)'}">${stk===0?'❌ نفد':'✓ متوفر: '+stk+' قطعة'}</div>`;
}
function addItem(){
  const mid=document.getElementById('it-m').value,color=document.getElementById('it-c')?.value;
  const size=document.getElementById('it-s')?.value||'';
  const qty=+document.getElementById('it-q').value,price=+document.getElementById('it-p').value;
  if(!mid){toast('اختر موديل',1);return}if(!color){toast('اختر لون',1);return}
  if(qty<=0){toast('الكمية يجب أن تكون أكبر من صفر',1);return}if(!price){toast('السعر مطلوب',1);return}
  const m=gModel(mid);
  let stk=0;
  if(m.variants?.length){const v=m.variants.find(v=>v.color===color&&(size?v.size===size:!v.size));stk=v?v.stock:0}
  else if(m.colors?.length&&typeof m.colors[0]==='object'){stk=m.colors.find(c=>c.color===color)?.stock||0}
  if(stk<qty){toast(`⚠️ الكمية المطلوبة (${qty}) أكبر من المتوفر (${stk})`,1);return}
  ni_items.push({modelId:mid,code:m.code,mname:m.name,color,size,qty,price,lineTotal:price*qty,lineCost:mCost(m)*qty});
  closeMo('mo-item');renderNIItems();
}
function renderNIItems(){

  const cost=ni_items.reduce((s,i)=>s+i.lineCost,0);
  const disc=+document.getElementById('ni-disc')?.value||0;

  el.innerHTML=ni_items.map((it,i)=>`<div class="li" style="margin-bottom:8px"><div class="li-body"><div class="li-title">${it.code} — ${it.mname}</div><div class="li-sub">${it.color}${it.size?' / '+it.size:''} • ${it.qty} قطعة × ${$m(it.price)}</div></div><div class="li-r" style="display:flex;align-items:center;gap:8px"><div class="li-amt">${$m(it.lineTotal)}</div><button onclick="ni_items.splice(${i},1);renderNIItems()" style="background:none;border:none;color:var(--rd);font-size:20px;cursor:pointer;line-height:1">✕</button></div></div>`).join('');
  te.style.display='block';
  te.innerHTML=`<div class="cr"><span style="color:var(--t2)">مجموع الأصناف</span><span>${$m(itemsTotal)}</span></div>${disc>0?`<div class="cr" style="color:var(--rd)"><span>خصم</span><span>- ${$m(disc)}</span></div>`:''}<div class="cr tot"><span>الإجمالي النهائي</span><span>${$m(total)}</span></div><div class="cr" style="color:var(--gr)"><span>الربح</span><span>${$m(profit)}</span></div>`;
}
function saveInv(){
  if(!ni_items.length){toast('أضف صنف واحد على الأقل',1);return}
  let custId=document.getElementById('ni-cust').value,custName='';
  if(custId==='__new'){const nn=document.getElementById('ni-nn')?.value?.trim();if(!nn){toast('أدخل اسم الزبون',1);return}const nc={id:uid(),name:nn,phone:'',address:'',notes:'',createdAt:today()};D.customers.push(nc);custId=nc.id;custName=nn}
  else if(custId){custName=gCust(custId)?.name||''}else{toast('اختر الزبون',1);return}
  const date=document.getElementById('ni-date').value||today(),notes=document.getElementById('ni-notes')?.value?.trim()||'';
  const disc=+document.getElementById('ni-disc')?.value||0;
  const itemsTotal=ni_items.reduce((s,i)=>s+i.lineTotal,0),cost=ni_items.reduce((s,i)=>s+i.lineCost,0);
  const total=Math.max(0,itemsTotal-disc),profit=total-cost;
  // deduct stock
  ni_items.forEach(it=>{
    const m=gModel(it.modelId);if(!m)return;
    if(m.variants?.length){const v=m.variants.find(v=>v.color===it.color&&(it.size?v.size===it.size:!v.size));if(v)v.stock=Math.max(0,v.stock-it.qty)}
    else if(m.colors?.length&&typeof m.colors[0]==='object'){const c=m.colors.find(c=>c.color===it.color);if(c)c.stock=Math.max(0,c.stock-it.qty)}
  });
  D.invCounter=(D.invCounter||0)+1;
  D.invoices.push({id:uid(),num:D.invCounter,date,customerId:custId,custName,items:ni_items.map(it=>({...it})),itemsTotal,discount:disc,total,cost,profit,status:'pending',collectedDate:null,notes,createdAt:today()});
  scheduleSave();toast('✓ تم إنشاء الفاتورة #'+D.invCounter);navTo('inv');
}

// ── REPORTS ──
function renderRep(){
  const spl=(D.settings.partnerSplit||50)/100;
  const p1n=D.settings.partnerName1||'الشريك الأول';
  const p2n=D.settings.partnerName2||'الشريك الثاني';
  // Per-shipment stats
  const ss=D.shipments.map(sh=>{
    const mids=new Set(D.models.filter(m=>m.shipmentId===sh.id).map(m=>m.id));
    let rev=0,cost=0;
    D.invoices.filter(i=>i.status==='collected').forEach(inv=>{
      inv.items.forEach(it=>{if(mids.has(it.modelId)){rev+=it.lineTotal;cost+=(it.lineCost||0)}});
      inv.returns?.forEach(r=>r.items.forEach(it=>{if(mids.has(it.modelId))rev-=it.lineTotal}));
    });
    return{sh,profit:rev-cost,p1Pay:sh.partner1Pay||0,p2Pay:sh.partner2Pay||0};
  });
  const col=D.invoices.filter(i=>i.status==='collected');
  const pen=D.invoices.filter(i=>i.status==='pending');
  const rev=col.reduce((s,i)=>s+i.total-(i.returnedTotal||0),0);
  const penAmt=pen.reduce((s,i)=>s+i.total,0);
  const cogs=col.reduce((s,i)=>s+(i.cost||0),0);
  const exp=D.expenses.reduce((s,e)=>s+e.amount,0);
  const gp=rev-cogs,np=gp-exp;
  const shipInv=D.shipments.reduce((s,sh)=>s+(sh.pc||0)+(sh.sc||0)+(sh.cc||0)+(sh.kc||0),0);
  const oldCap=D.capital.reduce((s,c)=>s+c.amount,0);
  const newCap=ss.reduce((s,x)=>s+x.p1Pay+x.p2Pay,0);
  const wd=D.withdrawals.reduce((s,w)=>s+w.amount,0);
  const cash=oldCap+newCap+rev-shipInv-exp-wd;
  const stkVal=D.models.reduce((s,m)=>s+mStock(m)*mCost(m),0);
  // Build partner account
  function pAcc(name,isP1){
    const contrib=[];
    ss.forEach(x=>{const pay=isP1?x.p1Pay:x.p2Pay;if(pay>0)contrib.push({date:x.sh.date||today(),desc:'مساهمة — '+x.sh.name,amount:pay,s:'+'})});
    D.capital.filter(c=>c.partner===name).forEach(c=>contrib.push({date:c.date,desc:'رأس مال'+(c.notes?' — '+c.notes:''),amount:c.amount,s:'+'}));
    contrib.sort((a,b)=>a.date<b.date?-1:1);
    const profits=ss.filter(x=>x.profit!==0).map(x=>({date:x.sh.date||today(),desc:'ربح — '+x.sh.name,amount:Math.abs(x.profit*(isP1?spl:1-spl)),s:x.profit>=0?'+':'-'}));
    const wds=D.withdrawals.filter(w=>w.partner===name).sort((a,b)=>a.date<b.date?-1:1).map(w=>({date:w.date,desc:'سحب'+(w.notes?' — '+w.notes:''),amount:w.amount,s:'-'}));
    const myExps=D.expenses.map(e=>({date:e.date,desc:'مصاريف — '+e.description,amount:e.amount*(isP1?spl:1-spl),s:'-'}));
    const tc=contrib.reduce((s,e)=>s+e.amount,0);
    const tp=profits.reduce((s,e)=>s+(e.s==='+'?e.amount:-e.amount),0);
    const tw=wds.reduce((s,e)=>s+e.amount,0);
    const te=myExps.reduce((s,e)=>s+e.amount,0);
    return{contrib,profits,wds,myExps,tc,tp,tw,te,balance:tc+tp-tw-te};
  }
  const a1=pAcc(p1n,true),a2=pAcc(p2n,false);
  function eRow(e){return`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:13px"><div style="flex:1;min-width:0"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.desc}</div><div style="color:var(--t3);font-size:11px">${fmtDate(e.date)}</div></div><span style="font-weight:600;color:${e.s==='+'?'var(--gr)':'var(--rd)'};margin-right:8px;flex-shrink:0;white-space:nowrap">${e.s==='+'?'+':'-'}${$m(e.amount)}</span></div>`}
  function secTitle(t){return t?`<div style="color:var(--t2);font-size:12px;font-weight:600;margin:10px 0 4px">${t}</div>`:''}
  function accBlock(a,name){
    return`<div class="card" style="margin:0 0 14px">
      <div style="font-size:16px;font-weight:700;color:var(--am);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)">${name}</div>
      ${a.contrib.length?secTitle('💰 رأس المال المدفوع')+a.contrib.map(eRow).join(''):''}
      ${a.profits.length?secTitle('📈 الأرباح من الشحنات')+a.profits.map(eRow).join(''):''}
      ${a.myExps?.length?secTitle('🔧 المصاريف (حصتي)')+a.myExps.map(eRow).join(''):''}
      ${a.wds.length?secTitle('↩️ السحوبات')+a.wds.map(eRow).join(''):''}
      <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding:10px 0 0;margin-top:8px;border-top:2px solid var(--bd)"><span>الرصيد الإجمالي</span><span style="color:${a.balance>=0?'var(--gr)':'var(--rd)'}">${$m(a.balance)}</span></div>
    </div>`;
  }
  document.getElementById('rep-body').innerHTML=`<div class="pp">
    <div class="sh" style="padding:0 0 10px"><span class="st">💵 السيولة</span></div>
    <div class="card" style="margin:0 0 16px">
      <div class="rr"><span class="rl">كاش جاهز بالصندوق</span><span class="rv" style="color:var(--am)">${$m(cash)}</span></div>
      <div class="rr"><span class="rl">كاش بالطريق (${pen.length} فاتورة)</span><span class="rv">${$m(penAmt)}</span></div>
      <div class="rr rtot"><span class="rl">إجمالي السيولة</span><span class="rv">${$m(cash+penAmt)}</span></div>
    </div>
    <div class="sh" style="padding:12px 0 10px"><span class="st">📈 الأرباح والخسائر</span></div>
    <div class="card" style="margin:0 0 16px">
      <div class="rr"><span class="rl">إيرادات مقبوضة (بعد المرتجعات)</span><span class="rv" style="color:var(--gr)">${$m(rev)}</span></div>
      <div class="rr"><span class="rl">تكلفة البضاعة المباعة</span><span class="rv">${$m(cogs)}</span></div>
      <div class="rr"><span class="rl">الربح الإجمالي</span><span class="rv">${$m(gp)}</span></div>
      <div class="rr"><span class="rl">المصاريف التشغيلية</span><span class="rv">${$m(exp)}</span></div>
      <div class="rr rtot"><span class="rl">✨ صافي الربح</span><span class="rv" style="color:${np>=0?'var(--gr)':'var(--rd)'}">${$m(np)}</span></div>
    </div>
    ${ss.length?`<div class="sh" style="padding:12px 0 10px"><span class="st">📊 الربح حسب الشحنة</span></div>
    <div class="card" style="margin:0 0 16px">${ss.map(x=>`<div class="rr"><span class="rl">${x.sh.name}</span><span class="rv" style="color:${x.profit>=0?'var(--gr)':'var(--rd)'}">${$m(x.profit)}</span></div>`).join('')}</div>`:''}
    <div class="sh" style="padding:12px 0 10px"><span class="st">👥 حسابات الشركاء</span></div>
    ${accBlock(a1,p1n)}
    ${accBlock(a2,p2n)}
    <div class="sh" style="padding:12px 0 10px"><span class="st">⚡ إضافات سريعة</span></div>
    <button class="sb2" onclick="qModal('exp')">🔧 تسجيل مصروف</button>
    <button class="sb2" onclick="qModal('wd')">↩️ تسجيل سحب شريك</button>
    <button class="sb2" onclick="push('ship');renderShipList()">🚢 إدارة الشحنات (+ رأس المال)</button>
    <button class="sb2" onclick="openCatalogMo()">📋 إنشاء كتالوج</button>
    <button class="sb2" onclick="exportReportPDF()">📊 تصدير التقرير PDF</button>
    <button class="sb2" onclick="exportReportCSV()">📋 تصدير التقرير Excel</button>
    <button class="sb2" onclick="exportInventoryPDF()">📦 تقرير المخزون PDF</button>
    <button class="sb2" onclick="exportInventoryCSV()">📦 تصدير المخزون Excel</button>
    </div>`;
}

function generateCatalogPaged(ms,showPrice,showStock,logo){
  const coName=D.settings.companyName;
  const pages=ms.map(m=>{
    const byColor={};
    if(m.variants?.length)m.variants.forEach(v=>{if(!byColor[v.color])byColor[v.color]={};if(v.size)byColor[v.color][v.size]=v.stock;else byColor[v.color]['_']=v.stock});
    else if(m.colors?.length&&typeof m.colors[0]==='object')m.colors.forEach(c=>{byColor[c.color]={'_':c.stock}});
    const varTbl=Object.entries(byColor).map(([col,szs])=>{
      const entries=Object.entries(szs).filter(([k])=>k!=='_');
      if(entries.length){
        return`<tr><td style="font-weight:600;padding:6px 8px;border-bottom:1px solid #eee">${col}</td>${entries.map(([sz,stk])=>`<td style="text-align:center;padding:6px 8px;border-bottom:1px solid #eee">${sz}<br>${showStock?`<small style="color:#aaa">${stk}</small>`:''}</td>`).join('')}</tr>`;
      }else{const stk=szs['_']||0;return`<tr><td style="font-weight:600;padding:6px 8px">${col}</td><td style="padding:6px 8px">${showStock?stk+' قطعة':''}</td></tr>`}
    }).join('');
    const sizeCols=m.sizes?.length?m.sizes.map(s=>`<th style="background:#c98a4b;color:white;padding:6px 8px;text-align:center">${s}</th>`).join(''):'';
    const photos=m.photos?.length?m.photos.map(p=>`<img src="${p}" style="max-height:220px;max-width:45%;object-fit:contain;border-radius:8px;margin:4px">`).join(''):'';
    return`<div style="page-break-after:always;padding:16px;min-height:90vh;border-bottom:2px solid #c98a4b">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">

        <div style="color:#777;font-size:12px;text-align:left">${coName}</div>
      </div>
      ${photos?`<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:12px 0;background:#f9f9f9;padding:12px;border-radius:8px">${photos}</div>`:''}
      ${varTbl?`<table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:13px"><thead><tr><th style="background:#c98a4b;color:white;padding:6px 8px;text-align:right">اللون</th>${sizeCols}</tr></thead><tbody>${varTbl}</tbody></table>`:''}
    </div>`;
  }).join('');
  const html=`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Tahoma,sans-serif;color:#222}
@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head>
<body>${pages}</body></html>`;
  const w=window.open('','_blank');if(!w){toast('اسمح بالنوافذ المنبثقة',1);return}
  w.document.write(html);w.document.close();closeMo('mo-item');setTimeout(()=>w.print(),700);
}

function generateCatalog(){
  const paged=document.getElementById('cat-paged')?.checked||false;

  const io=document.getElementById('cat-instock').checked;
  let ms=D.models;
  if(sf)ms=ms.filter(m=>m.shipmentId===sf);
  if(io)ms=ms.filter(m=>mStock(m)>0);
  if(!ms.length){toast('لا يوجد موديلات بهذه الفلترة',1);return}
  const logo=D.settings.logo?`<img src="${D.settings.logo}" style="max-height:70px;max-width:140px;object-fit:contain;margin-bottom:8px"><br>`:'';
  if(paged)return generateCatalogPaged(ms,sp,ss,logo);
  const cat=`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${D.settings.companyName} — الكتالوج</title>

.card img{width:100%;height:140px;object-fit:cover}
.ci{padding:12px}.code{font-size:11px;color:#aaa;margin-bottom:3px}.name{font-weight:700;font-size:14px;margin-bottom:8px}
.vars{font-size:12px;color:#555;line-height:1.8}.price{margin-top:8px;font-weight:700;color:#c98a4b;font-size:15px}
@media print{body{background:#fff;padding:10px}.grid{grid-template-columns:repeat(3,1fr)}}</style></head>
<body><div class="hdr">${logo}<h1>${D.settings.companyName}</h1><p>الكتالوج • ${new Date().toLocaleDateString('ar-SY')} • ${ms.length} موديل</p></div>
<div class="grid">${ms.map(m=>{
  const byColor={};
  if(m.variants?.length)m.variants.forEach(v=>{if(!byColor[v.color])byColor[v.color]={};if(v.size)byColor[v.color][v.size]=v.stock;else byColor[v.color]['stock']=v.stock});
  else if(m.colors?.length&&typeof m.colors[0]==='object')m.colors.forEach(c=>{byColor[c.color]={'stock':c.stock}});
  const ph=m.photos?.length?`<img src="${m.photos[0]}">`:'';
  const vars=Object.entries(byColor).map(([color,sizes])=>{
    const szParts=Object.entries(sizes).filter(([sz])=>sz!=='stock').map(([sz,stk])=>`${sz}${ss?'('+stk+')':''}`).join(' ');
    const directStk=sizes['stock'];
    return `${color}${szParts?' — '+szParts:''}${ss&&directStk!==undefined?' ('+directStk+')':''}`;
  }).join('<br>');
  return `<div class="card">${ph}<div class="ci"><div class="code">${m.code}</div><div class="name">${m.name}</div><div class="vars">${vars}</div>${sp?`<div class="price">$${m.salePrice}</div>`:''}</div></div>`;
}).join('')}</div>
<div style="text-align:center;margin-top:24px;color:#aaa;font-size:12px">يمكنك طباعة هذه الصفحة من المتصفح (Share → Print)</div></body></html>`;
  const w=window.open('','_blank');if(!w){toast('اسمح بالنوافذ المنبثقة في المتصفح',1);return}
  w.document.write(cat);w.document.close();closeMo('mo-item');
}

function handleLogo(file){if(!file)return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const max=300,rt=Math.min(1,max/Math.max(img.width,img.height));c.width=Math.round(img.width*rt);c.height=Math.round(img.height*rt);c.getContext('2d').drawImage(img,0,0,c.width,c.height);D.settings.logo=c.toDataURL('image/jpeg',0.75);scheduleSave();renderSet();toast('✓ تم رفع اللوغو')};img.src=e.target.result};r.readAsDataURL(file)}
function removeLogo(){confirm2('حذف اللوغو','هل أنت متأكد؟',()=>{D.settings.logo='';scheduleSave();renderSet();toast('تم الحذف')})}
function saveSet(){
  D.settings.companyName=document.getElementById('s-cn').value.trim()||'المستودع';
  D.settings.partnerName1=document.getElementById('s-p1').value.trim()||'الشريك الأول';
  D.settings.partnerName2=document.getElementById('s-p2').value.trim()||'الشريك الثاني';
  D.settings.partnerSplit=Math.min(100,Math.max(0,+document.getElementById('s-sp').value||50));
  D.settings.lowStock=Math.max(1,+document.getElementById('s-ls').value||5);
  scheduleSave();toast('✓ تم حفظ الإعدادات');
}

  const w=window.open('','_blank');if(!w){toast('اسمح بالنوافذ المنبثقة',1);return}
  w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
}

// ── WHATSAPP SHARE ──
function shareInvoiceWA(id){
  const inv=D.invoices.find(i=>i.id===id);if(!inv)return;
  const cust=gCust(inv.customerId);
  const retTotal=inv.returnedTotal||0;
  let txt=`🧾 فاتورة #${inv.num}\n📅 ${fmtDate(inv.date)}\n👤 ${inv.custName}\n`;
  txt+=`${'─'.repeat(20)}\n`;
  txt+=inv.items.map(it=>`• ${it.code} / ${it.color}${it.size?' / '+it.size:''} × ${it.qty} = ${$m(it.lineTotal)}`).join('\n');
  txt+=`\n${'─'.repeat(20)}\n`;
  if(inv.discount)txt+=`خصم: - ${$m(inv.discount)}\n`;
  if(retTotal)txt+=`مرتجعات: - ${$m(retTotal)}\n`;
  txt+=`💰 الإجمالي: ${$m(inv.total-retTotal)}\n`;
  txt+=inv.status==='pending'?'⏳ بانتظار القبض':'✅ مقبوضة';
  const phone=cust?.phone?cust.phone.replace(/\D/g,''):'';
  window.open((phone?`https://wa.me/${phone}`:`https://wa.me/`)+'?text='+encodeURIComponent(txt),'_blank');
}

      </div>
    </div>`).join('')}
    <button class="sb" style="margin-top:12px" onclick="saveReturn('${id}')">↩️ تأكيد المرتجع</button>
    <button class="db2" onclick="closeMo('mo-item')">إلغاء</button>`;
  openMo('mo-item');
}
function saveReturn(invId){
  const inv=D.invoices.find(i=>i.id===invId);if(!inv)return;
  const retItems=[];let retTotal=0,any=false;
  inv.items.forEach((it,i)=>{
    const qty=+document.getElementById(`ret-${i}`)?.value||0;
    if(qty<=0)return;
    any=true;
    retItems.push({...it,qty,lineTotal:it.price*qty});
    retTotal+=it.price*qty;
    const m=gModel(it.modelId);if(!m)return;
    if(m.variants?.length){const v=m.variants.find(v=>v.color===it.color&&(it.size?v.size===it.size:!v.size));if(v)v.stock+=qty}
    else if(m.colors?.length&&typeof m.colors[0]==='object'){const col=m.colors.find(c=>c.color===it.color);if(col)col.stock+=qty}
  });
  if(!any){toast('لم تحدد أي قطع مرتجعة',1);return}
  if(!inv.returns)inv.returns=[];
  inv.returns.push({id:uid(),date:today(),items:retItems,total:retTotal});
  inv.returnedTotal=(inv.returnedTotal||0)+retTotal;
  inv.profit=Math.max(0,(inv.profit||0)-retTotal);
  scheduleSave();closeMo('mo-item');toast(`✓ تم تسجيل مرتجع بقيمة ${$m(retTotal)}`);showInvD(invId);
}

// ── EXPORT REPORTS ──
function dlFile(content,filename,type){
  const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportReportCSV(){
  const rows=[['النوع','التاريخ','الوصف','المبلغ ($)']];
  D.capital.forEach(c=>rows.push(['رأس مال',c.date,c.partner+(c.notes?' - '+c.notes:''),c.amount]));
  D.invoices.filter(i=>i.status==='collected').forEach(i=>rows.push(['إيراد',i.date,'فاتورة #'+i.num+' - '+i.custName,i.total-(i.returnedTotal||0)]));
  D.expenses.forEach(e=>rows.push(['مصروف',e.date,e.description,-e.amount]));
  D.withdrawals.forEach(w=>rows.push(['سحب',w.date,w.partner+(w.notes?' - '+w.notes:''),-w.amount]));
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  dlFile(csv,'warehouse-report.csv','text/csv;charset=utf-8');
}
function exportInventoryCSV(){
  const rows=[['الكود','الاسم','اللون','المقاس','الكمية','سعر الشراء','شحن','عمولة','التكلفة','سعر البيع','الربح/قطعة']];
  D.models.forEach(m=>{
    const tc=mCost(m),pr=(m.salePrice||0)-tc;
    if(m.variants?.length)m.variants.forEach(v=>rows.push([m.code,m.name,v.color,v.size||'—',v.stock,m.baseCost||0,m.shippingCost||0,m.commission||0,tc,m.salePrice||0,pr]));
    else if(m.colors?.length&&typeof m.colors[0]==='object')m.colors.forEach(col=>rows.push([m.code,m.name,col.color,'—',col.stock,m.baseCost||0,m.shippingCost||0,m.commission||0,tc,m.salePrice||0,pr]));
    else rows.push([m.code,m.name,'—','—',mStock(m),m.baseCost||0,m.shippingCost||0,m.commission||0,tc,m.salePrice||0,pr]);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  dlFile(csv,'warehouse-inventory.csv','text/csv;charset=utf-8');
}
function exportReportPDF(){
  const spl=(D.settings.partnerSplit||50)/100;
  const p1n=D.settings.partnerName1||'الشريك الأول';
  const p2n=D.settings.partnerName2||'الشريك الثاني';
  const ss2=D.shipments.map(sh=>{
    const mids=new Set(D.models.filter(m=>m.shipmentId===sh.id).map(m=>m.id));
    let rv=0,co=0;
    D.invoices.filter(i=>i.status==='collected').forEach(inv=>{
      inv.items.forEach(it=>{if(mids.has(it.modelId)){rv+=it.lineTotal;co+=(it.lineCost||0)}});
      inv.returns?.forEach(r=>r.items.forEach(it=>{if(mids.has(it.modelId))rv-=it.lineTotal}));
    });
    return{sh,profit:rv-co,p1Pay:sh.partner1Pay||0,p2Pay:sh.partner2Pay||0};
  });
  const col2=D.invoices.filter(i=>i.status==='collected');
  const pen2=D.invoices.filter(i=>i.status==='pending');
  const rev2=col2.reduce((s,i)=>s+i.total-(i.returnedTotal||0),0);
  const penAmt2=pen2.reduce((s,i)=>s+i.total,0);
  const cogs2=col2.reduce((s,i)=>s+(i.cost||0),0);
  const exp2=D.expenses.reduce((s,e)=>s+e.amount,0);
  const gp2=rev2-cogs2,np2=gp2-exp2;
  const shipInv2=D.shipments.reduce((s,sh)=>s+(sh.pc||0)+(sh.sc||0)+(sh.cc||0)+(sh.kc||0),0);
  const oldCap2=D.capital.reduce((s,c2)=>s+c2.amount,0);
  const newCap2=ss2.reduce((s,x)=>s+x.p1Pay+x.p2Pay,0);
  const wd2=D.withdrawals.reduce((s,w)=>s+w.amount,0);
  const cash2=oldCap2+newCap2+rev2-shipInv2-exp2-wd2;
  const stkVal2=D.models.reduce((s,m)=>s+mStock(m)*mCost(m),0);
  function pAcc2(name,isP1){
    const contrib=[];
    ss2.forEach(x=>{const pay=isP1?x.p1Pay:x.p2Pay;if(pay>0)contrib.push({date:x.sh.date||today(),desc:'مساهمة — '+x.sh.name,amount:pay,s:'+'})});
    D.capital.filter(cp=>cp.partner===name).forEach(cp=>contrib.push({date:cp.date,desc:'رأس مال'+(cp.notes?' — '+cp.notes:''),amount:cp.amount,s:'+'}));
    contrib.sort((a,b)=>a.date<b.date?-1:1);
    const profits=ss2.filter(x=>x.profit!==0).map(x=>({date:x.sh.date||today(),desc:'ربح — '+x.sh.name,amount:Math.abs(x.profit*(isP1?spl:1-spl)),s:x.profit>=0?'+':'-'}));
    const wds=D.withdrawals.filter(w=>w.partner===name).sort((a,b)=>a.date<b.date?-1:1).map(w=>({date:w.date,desc:'سحب'+(w.notes?' — '+w.notes:''),amount:w.amount,s:'-'}));
    const myExps2=D.expenses.map(e=>({date:e.date,desc:'مصاريف — '+e.description,amount:e.amount*(isP1?spl:1-spl),s:'-'}));
    const tc2=contrib.reduce((s,e)=>s+e.amount,0);
    const tp2=profits.reduce((s,e)=>s+(e.s==='+'?e.amount:-e.amount),0);
    const tw2=wds.reduce((s,e)=>s+e.amount,0);
    const te2=myExps2.reduce((s,e)=>s+e.amount,0);
    return{contrib,profits,wds,myExps:myExps2,balance:tc2+tp2-tw2-te2};
  }
  const a12=pAcc2(p1n,true),a22=pAcc2(p2n,false);
  const logo=D.settings.logo?`<img src="${D.settings.logo}" style="max-height:50px;object-fit:contain">`:'';
  const row2=(lbl,val,color)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px"><span>${lbl}</span><span style="font-weight:600${color?';color:'+color:''}">${val}</span></div>`;
  const rtot2=(lbl,val,color)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:15px;font-weight:700;color:${color||'#c98a4b'};border-top:2px solid #c98a4b;margin-top:4px"><span>${lbl}</span><span>${val}</span></div>`;
  const h22=lbl=>`<div style="font-size:14px;font-weight:700;color:#c98a4b;margin:16px 0 8px;border-bottom:1px solid #eee;padding-bottom:4px">${lbl}</div>`;
  function eRow2(e){return`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:12px"><div><div>${e.desc}</div><div style="color:#aaa;font-size:10px">${fmtDate(e.date)}</div></div><span style="font-weight:600;color:${e.s==='+'?'green':'red'};margin-right:6px">${e.s==='+'?'+':'-'}${$m(e.amount)}</span></div>`}
  function accBlock2(a,name){return`<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:14px;margin-bottom:12px">
    <div style="font-size:15px;font-weight:700;color:#c98a4b;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee">${name}</div>
    ${a.contrib.length?`<div style="font-size:11px;font-weight:600;color:#777;margin:8px 0 4px">💰 رأس المال</div>${a.contrib.map(eRow2).join('')}`:''}
    ${a.profits.length?`<div style="font-size:11px;font-weight:600;color:#777;margin:8px 0 4px">📈 الأرباح</div>${a.profits.map(eRow2).join('')}`:''}
    ${a.myExps?.length?`<div style="font-size:11px;font-weight:600;color:#777;margin:8px 0 4px">🔧 المصاريف (حصتي)</div>${a.myExps.map(eRow2).join('')}`:''}
    ${a.wds.length?`<div style="font-size:11px;font-weight:600;color:#777;margin:8px 0 4px">↩️ السحوبات</div>${a.wds.map(eRow2).join('')}`:''}
    <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding:8px 0 0;margin-top:6px;border-top:2px solid #eee"><span>الرصيد الإجمالي</span><span style="color:${a.balance>=0?'green':'red'}">${$m(a.balance)}</span></div>
  </div>`}
  const html=`<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><style>
@page{margin:12mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Tahoma,sans-serif;color:#222;font-size:13px}
.hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #c98a4b;padding-bottom:12px;margin-bottom:16px}
.co{font-size:18px;font-weight:700;color:#c98a4b}.date{color:#777;font-size:12px}
@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head>
<body>
<div class="hdr"><div>${logo}<div class="co">${D.settings.companyName}</div></div><div class="date">تقرير شامل — ${new Date().toLocaleDateString('ar-SY')}</div></div>
${h22('💵 السيولة')}${row2('كاش جاهز',$m(cash2),cash2>=0?'#c98a4b':'red')}${row2('كاش بالطريق ('+pen2.length+' فاتورة)',$m(penAmt2),null)}${row2('قيمة المخزون',$m(stkVal2),null)}${rtot2('إجمالي الأصول',$m(cash2+penAmt2+stkVal2))}
${h22('📈 الأرباح والخسائر')}${row2('إيرادات مقبوضة',$m(rev2),'green')}${row2('تكلفة البضاعة المباعة',$m(cogs2),null)}${row2('الربح الإجمالي',$m(gp2),null)}${row2('المصاريف',$m(exp2),null)}${rtot2('✨ صافي الربح',$m(np2),np2>=0?'green':'red')}
${ss2.length?h22('📊 الربح حسب الشحنة')+ss2.map(x=>row2(x.sh.name,$m(x.profit),x.profit>=0?'green':'red')).join(''):''}
${h22('👥 حسابات الشركاء')}${accBlock2(a12,p1n)}${accBlock2(a22,p2n)}
</body></html>`;
  const w=window.open('','_blank');if(!w){toast('اسمح بالنوافذ المنبثقة',1);return}
  w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
}


async function pickContact(){
  if(!navigator?.contacts?.select){toast('المتصفح ما يدعم هاد الخيار بعد',1);return}
  try{
    const cs=await navigator.contacts.select(['tel','name'],{multiple:false});
    if(!cs.length)return;
    const phone=cs[0].tel?.[0]||'',name=cs[0].name?.[0]||'';
    const pEl=document.getElementById('cf-p');if(pEl&&phone)pEl.value=phone;
    const nEl=document.getElementById('cf-n');if(nEl&&name&&!nEl.value)nEl.value=name;
  }catch(e){toast('تعذر الوصول لجهات الاتصال',1)}
}
